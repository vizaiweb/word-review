<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kids Word & Sentence Practice</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* ====================== 全局基础样式 ====================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; padding: 15px; line-height: 1.5; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 28px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, #ff9a56, #ff6b35); color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 26px; letter-spacing: 1px; }

        .select-section { padding: 16px 18px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .select-row { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .mode-row { justify-content: space-between; }

        .select-row label { font-weight: 600; color: #1e293b; min-width: 60px; }
        .select-row select, .select-row input { flex: 1; padding: 8px 10px; font-size: 15px; border: 1px solid #cbd5e1; border-radius: 12px; background: white; height: 42px; }
        .select-row button { padding: 8px 18px; font-size: 15px; border: none; border-radius: 30px; color: white; cursor: pointer; font-weight: bold; transition: all 0.2s; background: #3b82f6; }
        
        .btn-level { background: #ff4500; }
        .btn-file { background: #0f67b3; }
        .btn-filter { background: #2b7e3a; }
        .save-btn { background: white !important; color: #333 !important; border: 2px solid #ff9a56 !important; padding: 6px 15px !important; }
        .save-btn:active { background: #fff5ed !important; }

        .mode-toggle { background: #ffb347; margin-bottom: 5px; }
        .mode-toggle.active { background: #2b7e3a; box-shadow: 0 0 0 2px #f0f4f8, 0 0 0 4px #2b7e3a; }

        #dayRow { display: flex; flex-wrap: nowrap; align-items: center; gap: 8px; }
        .practice-section { padding: 20px 18px; border-bottom: 1px dashed #e2e8f0; }
        .meaning { font-size: 26px; color: #0f172a; margin-bottom: 15px; font-weight: 500; }
        .word { font-size: clamp(28px, 8vw, 52px); font-weight: bold; color: #dc2626; margin-bottom: 20px; word-break: break-word; }
        .btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 15px 0; }
        .btn-group button { padding: 12px; font-size: 16px; border: none; border-radius: 40px; font-weight: bold; color: white; cursor: pointer; background: #22c55e; }
        .show-all-btn { background: #3b82f6; border: none; border-radius: 40px; padding: 12px; color: white; font-weight: bold; margin: 8px 0 0; cursor: pointer; width: 100%; font-size: 16px; }
        
        .sentence-section { background: #fef9e8; border-top: 3px solid #ffb347; padding: 20px 18px; border-radius: 0 0 20px 20px; }
        .sentence-header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; margin-bottom: 15px; border-bottom: 2px solid #ffd966; padding-bottom: 8px; }
        .sentence-meaning { font-size: 22px; color: #2c3e2f; background: #fff6e5; padding: 12px; border-radius: 20px; margin: 10px 0; }
        .sentence-en { font-size: clamp(20px, 6vw, 32px); font-weight: bold; color: #b45309; margin: 12px 0; line-height: 1.4; }
        .sentence-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 15px 0; }
        .sentence-buttons button { padding: 12px; font-size: 16px; border: none; border-radius: 40px; font-weight: bold; color: white; cursor: pointer; background: #22c55e; }
        
        .footer { max-width: 700px; margin: 20px auto; text-align: center; font-size: 13px; color: #5b6e8c; }
        .footer a { color: #ff6b35; text-decoration: none; margin: 0 6px; }
        .hidden-level { display: none !important; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌟 Kids English 🌟</h1>
    </div>

    <div class="select-section">
        <div class="select-row mode-row">
            <div>
                <label>📀 Mode:</label>
                <button id="modeToggleBtn" class="mode-toggle active">📁 Built-in DB</button>
            </div>
            <button id="saveSettingsBtn" class="save-btn">Save</button>
        </div>
        
        <div class="select-row" id="levelRow">
            <label>Level:</label>
            <select id="levelSelect">
                <option value="">Select P1/P2</option>
                <option value="P1">P1</option>
                <option value="P2">P2</option>
            </select>
            <button class="btn-level" id="levelConfirm">Confirm</button>
        </div>
        
        <div class="select-row" id="fileRow">
            <label>File:</label>
            <select id="fileSelect"><option value="">Waiting...</option></select>
            <button class="btn-file" id="fileConfirm">Confirm</button>
        </div>
        
        <div class="select-row" id="dayRow" style="display:none;">
            <label>Day:</label>
            <select id="daySelect">
                <option value="all">All Words</option>
                <option value="custom">Custom Day</option>
            </select>
            <input type="text" id="dayNum" value="--" readonly>
            <button class="btn-filter" id="filterBtn">Filter</button>
        </div>
    </div>

    <div class="practice-section" id="wordPracticeArea">
        <div id="wordContent"><p style="color:#64748b;">✨ Select Level & File to start ✨</p></div>
        <button class="show-all-btn" id="showAllBtn" style="display:none;">📋 Show All Words</button>
        <div id="infoTipContainer" class="info-tip" style="text-align: center; font-size: 12px; margin-top:10px; color:#94a3b8;"></div>
    </div>

    <div class="sentence-section" id="sentenceArea" style="display:none;">
        <div class="sentence-header">
            <h3>✏️ Sentence Practice</h3>
            <span id="sentenceStats" style="font-size: 12px;"></span>
        </div>
        <div id="sentenceContent">
            <div class="sentence-meaning">💡 Meaning</div>
            <div class="sentence-en" id="sentenceEnHidden" style="display:none;"></div>
            <div class="sentence-buttons">
                <button id="showSentenceBtn">📖 Show</button>
                <button id="readSentenceBtn">🔊 Read</button>
                <button id="prevSentenceBtn">⬅️ Prev</button>
                <button id="nextSentenceBtn">➡️ Next</button>
            </div>
        </div>
    </div>
</div>
<div class="footer"><a href="#">About</a></div>
<script src="script.js"></script>
</body>
</html>
