<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kids Word & Sentence Practice</title>
    <!-- Excel 解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* ====================== 全局基础样式 ====================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f4f8;
            padding: 15px;
            line-height: 1.5;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .header {
            background: linear-gradient(135deg, #ff9a56, #ff6b35);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 26px;
            letter-spacing: 1px;
        }

        .select-section {
            padding: 16px 18px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .select-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }
        .select-row label {
            font-weight: 600;
            color: #1e293b;
            min-width: 60px;
        }
        .select-row select, .select-row input {
            flex: 1;
            padding: 8px 10px;
            font-size: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            background: white;
            height: 42px;
        }
        .select-row button {
            padding: 8px 18px;
            font-size: 15px;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            background: #3b82f6;
        }
        .btn-level { background: #ff4500; }
        .btn-file { background: #0f67b3; }
        .btn-filter { background: #2b7e3a; }
        .select-row button:hover { opacity: 0.85; transform: scale(0.97); }
        
        .mode-toggle {
            background: #ffb347;
            margin-bottom: 5px;
        }
        .mode-toggle.active {
            background: #2b7e3a;
            box-shadow: 0 0 0 2px #f0f4f8, 0 0 0 4px #2b7e3a;
        }

        #dayRow {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 8px;
        }
        #dayRow label {
            flex-shrink: 0;
            min-width: 50px;
        }
        #daySelect {
            flex: 2;
            min-width: 0;
        }
        #dayNum {
            flex: 1;
            min-width: 60px;
        }
        #filterBtn {
            flex-shrink: 0;
            min-width: 70px;
        }
        
        @media (max-width: 550px) {
            #dayRow {
                gap: 6px;
            }
            #dayRow label {
                min-width: 45px;
                font-size: 14px;
            }
            #daySelect {
                flex: 2;
            }
            #dayNum {
                flex: 1;
                min-width: 55px;
                font-size: 14px;
            }
            #filterBtn {
                min-width: 65px;
                padding: 8px 12px;
                font-size: 14px;
            }
        }

        .practice-section {
            padding: 20px 18px;
            border-bottom: 1px dashed #e2e8f0;
        }
        
        .meaning {
            font-size: 26px;
            color: #0f172a;
            margin-bottom: 15px;
            font-weight: 500;
        }
        .word {
            font-size: clamp(28px, 8vw, 52px);
            font-weight: bold;
            color: #dc2626;
            margin-bottom: 20px;
            word-break: break-word;
        }
        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0;
        }
        .btn-group button {
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            background: #22c55e;
            transition: transform 0.1s;
        }
        .btn-group button:active {
            transform: scale(0.96);
        }
        .btn-prev:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .show-all-btn {
            background: #3b82f6;
            border: none;
            border-radius: 40px;
            padding: 12px;
            color: white;
            font-weight: bold;
            margin: 8px 0 0;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: transform 0.1s;
        }
        .show-all-btn:active {
            transform: scale(0.97);
        }
        .info-tip {
            font-size: 13px;
            color: #64748b;
            text-align: center;
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid #e2e8f0;
        }

        .sentence-section {
            background: #fef9e8;
            border-top: 3px solid #ffb347;
            padding: 20px 18px;
            border-radius: 0 0 20px 20px;
        }
        .sentence-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 15px;
            border-bottom: 2px solid #ffd966;
            padding-bottom: 8px;
        }
        .sentence-header h3 {
            font-size: 1.5rem;
            color: #c2410c;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sentence-stats {
            font-size: 14px;
            background: #fff1d6;
            padding: 4px 12px;
            border-radius: 40px;
        }
        .sentence-meaning {
            font-size: 22px;
            color: #2c3e2f;
            background: #fff6e5;
            padding: 12px;
            border-radius: 20px;
            margin: 10px 0;
            font-weight: 500;
        }
        .sentence-en {
            font-size: clamp(20px, 6vw, 32px);
            font-weight: bold;
            color: #b45309;
            margin: 12px 0;
            line-height: 1.4;
            word-break: break-word;
        }
        .sentence-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0;
        }
        .sentence-buttons button {
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            background: #22c55e;
            transition: transform 0.1s;
        }
        .sentence-buttons button:active {
            transform: scale(0.96);
        }
        .sentence-prev:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .btn-sentence-all {
            background: #3b82f6;
            border: none;
            border-radius: 40px;
            padding: 12px;
            color: white;
            font-weight: bold;
            margin-top: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: transform 0.1s;
        }
        .btn-sentence-all:active {
            transform: scale(0.97);
        }
        .sentence-tip {
            font-size: 12px;
            text-align: center;
            color: #a16207;
            margin-top: 12px;
        }
        
        button.reading-disabled {
            opacity: 0.6;
            cursor: wait;
            pointer-events: none;
        }
        
        .footer {
            max-width: 700px;
            margin: 20px auto 20px;
            text-align: center;
            font-size: 13px;
            color: #5b6e8c;
        }
        .footer a {
            color: #ff6b35;
            text-decoration: none;
            margin: 0 6px;
        }
        
        @media (max-width: 550px) {
            .meaning { font-size: 22px; }
            .sentence-meaning { font-size: 18px; }
            .btn-group button, .sentence-buttons button, .show-all-btn, .btn-sentence-all {
                font-size: 14px;
                padding: 10px;
            }
        }
        
        .external-url-row input {
            background: #fffaf0;
            font-family: monospace;
        }
        
        .level-row.hidden-level {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌟 Kids Word & Sentence Practice 🌟</h1>
    </div>

    <div class="select-section">
        <div class="select-row">
            <label>📀 Mode:</label>
            <button id="modeToggleBtn" class="mode-toggle active">📁 Built-in DB</button>
            <span style="font-size:12px; color:#475569;">Switch to external link mode</span>
        </div>
        
        <div class="select-row level-row" id="levelRow">
            <label>Level:</label>
            <select id="levelSelect">
                <option value="">Select P1/P2</option>
                <option value="P1">P1</option>
                <option value="P2">P2</option>
            </select>
            <button class="btn-level" id="levelConfirm">Confirm</button>
        </div>
        
        <div class="select-row" id="fileRow">
            <label>File:</label>
            <select id="fileSelect"><option>Loading...</option></select>
            <button class="btn-file" id="fileConfirm">Confirm</button>
        </div>
        
        <div class="select-row external-url-row" id="externalUrlRow" style="display:none;">
            <label>🔗 URL:</label>
            <input type="text" id="externalUrlInput" placeholder="https://raw.githubusercontent.com/.../xxx.xlsx" value="">
            <button class="btn-file" id="externalUrlConfirmBtn">Load</button>
        </div>
        
        <div class="select-row" id="dayRow" style="display:none;">
            <label>Day:</label>
            <select id="daySelect">
                <option value="all" selected>All Words</option>
                <option value="custom">Custom Day</option>
            </select>
            <input type="text" id="dayNum" value="--" readonly>
            <button class="btn-filter" id="filterBtn">Filter</button>
        </div>
    </div>

    <div class="practice-section" id="wordPracticeArea">
        <div id="wordContent"><p style="color:#64748b;">✨ Select Level & File to start ✨</p></div>
        <button class="show-all-btn" id="showAllBtn" style="display:none;">📋 Show All Words</button>
        <div id="infoTipContainer" class="info-tip"></div>
    </div>

    <div class="sentence-section" id="sentenceArea" style="display:none;">
        <div class="sentence-header">
            <h3>✏️ Sentence Practice</h3>
            <span class="sentence-stats" id="sentenceStats">0 sentences</span>
        </div>
        <div id="sentenceContent">
            <div class="sentence-meaning">💡 Chinese meaning will appear</div>
            <div class="sentence-en" id="sentenceEnHidden" style="display:none;"></div>
            <div class="sentence-buttons">
                <button id="showSentenceBtn">📖 Show Sentence</button>
                <button id="readSentenceBtn">🔊 Read 3x</button>
                <button id="prevSentenceBtn" class="sentence-prev">⬅️ Previous</button>
                <button id="nextSentenceBtn">➡️ Next</button>
            </div>
            <button id="showAllSentencesBtn" class="btn-sentence-all">📜 Show All Sentences</button>
            <div class="sentence-tip" id="sentenceTip">⭐ Practice everyday sentences!</div>
        </div>
    </div>
</div>
<div class="footer">
    <a href="about.html">About</a> | <a href="privacy.html">Privacy Policy</a> | <a href="disclaimer.html">Disclaimer</a>
</div>

<script>
    // ---------- Global Variables ----------
    let allWords = [];
    let filteredWords = [];
    let currentWordIdx = 0;

    let allSentences = [];
    let currentSentenceIdx = 0;
    let currentFileNameForSentences = "";
    
    let currentLevel = "";
    let currentFileName = "";
    let currentExternalUrl = "";
    let currentMode = "local";
    
    const synth = window.speechSynthesis;

    let wordReadTimer = null;
    let sentenceReadTimer = null;
    let isSentenceReading = false;
    let currentReadButton = null;

    // ---------- Dynamic Branch Path (for built-in mode) ----------
    function getRawBaseUrl() {
        if (window.location.protocol === 'file:') return 'https://raw.githubusercontent.com/vizaiweb/word-review/main';
        const host = window.location.hostname;
        const path = window.location.pathname;
        if (host.includes('dev') || path.includes('dev')) return 'https://raw.githubusercontent.com/vizaiweb/word-review/dev';
        return 'https://raw.githubusercontent.com/vizaiweb/word-review/main';
    }

    function getFileListUrl(level) { return `${getRawBaseUrl()}/data/${level}/fileList.json`; }
    function getXlsxFileUrl(level, filename) { return `${getRawBaseUrl()}/data/${level}/${filename}`; }

    function removeExtension(fname) { return fname.replace(/\.xlsx$/i, ''); }

    // Unified data loading logic
    async function parseExcelBufferAndLoad(buf, sourceLabel = "file") {
        try {
            const wb = XLSX.read(buf, { type: "array" });
            
            // ========== Words from Sheet0 ==========
            const sheetName0 = wb.SheetNames[0];
            const wordData = XLSX.utils.sheet_to_json(wb.Sheets[sheetName0]);
            
            allWords = wordData.filter(item => item.word && item.meaning && item.day).map(item => ({
                word: String(item.word).trim(),
                meaning: String(item.meaning).trim(),
                day: Number(item.day)
            }));
            
            console.log(`✅ Successfully loaded ${allWords.length} words`);
            
            filteredWords = [...allWords];
            currentWordIdx = 0;
            
            // ========== Sentences from Sheet1 ==========
            allSentences = [];
            
            if (wb.SheetNames.length >= 2) {
                const sheetName1 = wb.SheetNames[1];
                const rawSentences = XLSX.utils.sheet_to_json(wb.Sheets[sheetName1]);
                
                if (rawSentences && rawSentences.length > 0) {
                    for (let row of rawSentences) {
                        let en = row.sentence || row.sentence_en || row.english || row.en || row.Sentence || row.English;
                        let zh = row.chinese || row.meaning || row.zh || row.sentence_zh || row.Chinese || row.Meaning;
                        
                        if (en && String(en).trim()) {
                            allSentences.push({ 
                                sentence_en: String(en).trim(), 
                                sentence_zh: zh ? String(zh).trim() : "✨ Practice sentence" 
                            });
                        }
                    }
                    console.log(`✅ Successfully loaded ${allSentences.length} sentences`);
                }
            }
            
            // Update UI
            const wordDiv = document.getElementById("wordContent");
            if (filteredWords.length) {
                showWord();
                updateInfoTip();
            } else {
                wordDiv.innerHTML = '<p>⚠️ No word data in this source.</p>';
            }
            document.getElementById("showAllBtn").style.display = allWords.length ? 'inline-block' : 'none';
            document.getElementById("dayRow").style.display = 'flex';
            
            if (allSentences.length === 0) {
                document.getElementById("sentenceArea").style.display = 'none';
            } else {
                document.getElementById("sentenceArea").style.display = 'block';
                currentSentenceIdx = 0;
                updateSentenceUI();
                updateSentenceStats();
            }
            return true;
        } catch (parseErr) {
            console.error("Excel parsing failed", parseErr);
            return false;
        }
    }
    
    // External mode loading
    async function loadFromExternalUrl(url) {
        if (!url) {
            alert("Please enter a valid Excel direct link (.xlsx)");
            return false;
        }
        stopAllReading();
        currentFileName = "";
        currentFileNameForSentences = url;
        currentExternalUrl = url;
        currentLevel = "";
        
        const wordDiv = document.getElementById("wordContent");
        wordDiv.innerHTML = '<p>🌐 Loading external Excel file ...</p>';
        document.getElementById("dayRow").style.display = 'none';
        document.getElementById("sentenceArea").style.display = 'none';
        document.getElementById("showAllBtn").style.display = 'none';
        document.getElementById("infoTipContainer").innerHTML = '';
        
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const buf = await res.arrayBuffer();
            const success = await parseExcelBufferAndLoad(buf, url);
            if (success) {
                const tipDiv = document.getElementById("infoTipContainer");
                if (tipDiv && filteredWords.length) {
                    const shortUrl = url.length > 60 ? url.substring(0,57)+"..." : url;
                    tipDiv.innerHTML = `🔗 External: ${shortUrl} | ${filteredWords.length} words | Sentences: ${allSentences.length}`;
                }
                return true;
            } else {
                throw new Error("Parse failed, please check file format");
            }
        } catch (err) {
            wordDiv.innerHTML = `<p style="color:#ef4444;">❌ Load failed: ${err.message}<br>Please ensure you provide a raw Excel download link</p>`;
            document.getElementById("sentenceArea").style.display = 'none';
            document.getElementById("showAllBtn").style.display = 'none';
            console.error(err);
            return false;
        }
    }
    
    // Built-in mode loading
    async function loadSelectedFile(filename) {
        if (!filename || !currentLevel) return;
        stopAllReading();
        currentFileName = filename;
        currentFileNameForSentences = filename;
        currentExternalUrl = "";
        const wordDiv = document.getElementById("wordContent");
        wordDiv.innerHTML = '<p>📖 Loading words & sentences...</p>';
        document.getElementById("dayRow").style.display = 'flex';
        document.getElementById("sentenceArea").style.display = 'none';
        document.getElementById("showAllBtn").style.display = 'none';
        document.getElementById("infoTipContainer").innerHTML = '';
        
        try {
            const url = getXlsxFileUrl(currentLevel, filename);
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const buf = await res.arrayBuffer();
            const success = await parseExcelBufferAndLoad(buf, filename);
            if (success) {
                updateInfoTip();
            } else {
                wordDiv.innerHTML = '<p>❌ Invalid file format</p>';
            }
        } catch(err) {
            wordDiv.innerHTML = '<p style="color:#ef4444;">❌ Failed to load file.</p>';
            document.getElementById("sentenceArea").style.display = 'none';
            console.error(err);
        }
    }
    
    // Load file list for built-in mode
    async function loadFileListByLevel(level) {
        const fileSelect = document.getElementById('fileSelect');
        const fileRow = document.getElementById('fileRow');
        fileSelect.innerHTML = '<option>Loading...</option>';
        fileRow.style.display = 'flex';
        try {
            const res = await fetch(getFileListUrl(level));
            if (!res.ok) throw new Error();
            const config = await res.json();
            const files = config.files || [];
            fileSelect.innerHTML = '';
            if (files.length === 0) { fileSelect.innerHTML = '<option>No files</option>'; return; }
            files.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f;
                opt.textContent = removeExtension(f);
                fileSelect.appendChild(opt);
            });
        } catch(e) {
            fileSelect.innerHTML = '<option>Load failed</option>';
            console.error(e);
        }
    }
    
    // Mode switching
    function toggleMode(mode) {
        currentMode = mode;
        const fileRow = document.getElementById('fileRow');
        const externalRow = document.getElementById('externalUrlRow');
        const levelRow = document.getElementById('levelRow');
        const toggleBtn = document.getElementById('modeToggleBtn');
        const dayRow = document.getElementById('dayRow');
        
        if (mode === "local") {
            fileRow.style.display = 'flex';
            externalRow.style.display = 'none';
            levelRow.classList.remove('hidden-level');
            toggleBtn.textContent = "📁 Built-in DB";
            toggleBtn.classList.add('active');
            if (currentExternalUrl) {
                allWords = [];
                filteredWords = [];
                allSentences = [];
                document.getElementById("wordContent").innerHTML = '<p style="color:#64748b;">✨ Switched to built-in mode, please select Level and file ✨</p>';
                document.getElementById("sentenceArea").style.display = 'none';
                document.getElementById("showAllBtn").style.display = 'none';
                dayRow.style.display = 'none';
                document.getElementById("infoTipContainer").innerHTML = '';
                currentLevel = "";
            }
        } else {
            fileRow.style.display = 'none';
            externalRow.style.display = 'flex';
            levelRow.classList.add('hidden-level');
            toggleBtn.textContent = "🌐 External Link";
            toggleBtn.classList.remove('active');
            if (currentFileName && allWords.length > 0) {
                allWords = [];
                filteredWords = [];
                allSentences = [];
                document.getElementById("wordContent").innerHTML = '<p>🔗 External mode activated, paste Excel direct link and click Load</p>';
                document.getElementById("sentenceArea").style.display = 'none';
                document.getElementById("showAllBtn").style.display = 'none';
                dayRow.style.display = 'none';
                document.getElementById("infoTipContainer").innerHTML = '';
                currentLevel = "";
            }
        }
    }
    
    // ---------- Speech and Display Logic ----------
    function speakTextWithCallback(text, onEnd, rate = 0.8) {
        if (!text) { if (onEnd) onEnd(); return; }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "en-US";
        utterance.rate = rate;
        utterance.volume = 1;
        const voices = synth.getVoices();
        const femaleVoice = voices.find(v => v.lang.includes("en") && (v.name.includes("Google") || v.name.includes("Samantha") || v.name.includes("Female")));
        if (femaleVoice) utterance.voice = femaleVoice;
        utterance.onend = () => { if (onEnd) onEnd(); };
        utterance.onerror = () => { if (onEnd) onEnd(); };
        synth.speak(utterance);
    }
    
    function read3Times(word) {
        if (wordReadTimer) clearInterval(wordReadTimer);
        synth.cancel();
        let count = 0;
        function speakNext() {
            if (count >= 3) return;
            speakTextWithCallback(word, () => {
                count++;
                if (count < 3) speakNext();
            }, 0.8);
        }
        speakNext();
    }
    
    function readSentence3Times(sentenceText, buttonElement) {
        if (!sentenceText) return;
        if (sentenceReadTimer) clearInterval(sentenceReadTimer);
        if (isSentenceReading) { synth.cancel(); isSentenceReading = false; if (currentReadButton) { currentReadButton.classList.remove('reading-disabled'); currentReadButton.disabled = false; } }
        currentReadButton = buttonElement;
        if (currentReadButton) { currentReadButton.classList.add('reading-disabled'); currentReadButton.disabled = true; }
        let readCount = 0;
        isSentenceReading = true;
        function speakNext() {
            if (readCount >= 3) {
                if (currentReadButton) { currentReadButton.classList.remove('reading-disabled'); currentReadButton.disabled = false; }
                isSentenceReading = false; currentReadButton = null;
                return;
            }
            speakTextWithCallback(sentenceText, () => { readCount++; speakNext(); }, 0.8);
        }
        synth.cancel();
        speakNext();
    }
    
    function stopAllReading() {
        synth.cancel();
        if (wordReadTimer) clearInterval(wordReadTimer);
        if (sentenceReadTimer) clearInterval(sentenceReadTimer);
        if (isSentenceReading) {
            isSentenceReading = false;
            if (currentReadButton) { currentReadButton.classList.remove('reading-disabled'); currentReadButton.disabled = false; currentReadButton = null; }
        }
    }
    
    function updateInfoTip() {
        const container = document.getElementById('infoTipContainer');
        if (!container) return;
        if (currentMode === "local" && currentFileName && filteredWords.length && filteredWords[currentWordIdx]) {
            const displayFile = removeExtension(currentFileName);
            const currentWord = filteredWords[currentWordIdx];
            container.innerHTML = `${displayFile} | Day ${currentWord.day} | ${currentWordIdx + 1}/${filteredWords.length} words | ✏️ Sentences: ${allSentences.length}`;
        } else if (currentMode === "external" && currentExternalUrl && filteredWords.length && filteredWords[currentWordIdx]) {
            const currentWord = filteredWords[currentWordIdx];
            container.innerHTML = `🔗 External | Day ${currentWord.day} | ${currentWordIdx + 1}/${filteredWords.length} words | ✏️ Sentences: ${allSentences.length}`;
        } else if (allSentences.length > 0) {
            container.innerHTML = `✨ Total ${allSentences.length} sentences available ✨`;
        } else {
            container.innerHTML = '';
        }
    }
    
    function showWord() {
        stopAllReading();
        const container = document.getElementById("wordContent");
        if (!filteredWords.length) {
            container.innerHTML = '<p>📭 No words match this day.</p>';
            updateInfoTip();
            return;
        }
        if (currentWordIdx >= filteredWords.length) {
            container.innerHTML = '<p style="color:#22c55e;">🎉 Great! All words practiced!</p>';
            updateInfoTip();
            return;
        }
        const w = filteredWords[currentWordIdx];
        const isFirst = currentWordIdx === 0;
        container.innerHTML = `
            <div class="meaning">💡 ${w.meaning}</div>
            <div class="word" id="currentWordSpan" style="display:none;">${w.word.toUpperCase()}</div>
            <div class="btn-group">
                <button class="btn-show" id="btnShowWord">👀 Show Word</button>
                <button class="btn-read" id="btnReadWord">🔊 Read 3x</button>
                <button class="btn-prev" id="btnPrevWord" ${isFirst ? "disabled" : ""}>⬅️ Previous</button>
                <button class="btn-next" id="btnNextWord">➡️ Next</button>
            </div>
        `;
        updateInfoTip();
        document.getElementById("btnShowWord")?.addEventListener("click", () => { const span = document.getElementById("currentWordSpan"); if(span) span.style.display = "block"; });
        document.getElementById("btnReadWord")?.addEventListener("click", () => read3Times(w.word));
        document.getElementById("btnPrevWord")?.addEventListener("click", () => { if(currentWordIdx > 0) { currentWordIdx--; showWord(); } });
        document.getElementById("btnNextWord")?.addEventListener("click", () => { if(currentWordIdx + 1 <= filteredWords.length) { currentWordIdx++; showWord(); } });
    }
    
    function filterByDay() {
        stopAllReading();
        const daySelect = document.getElementById('daySelect');
        const dayNum = document.getElementById('dayNum');
        if(daySelect.value === 'all') {
            filteredWords = JSON.parse(JSON.stringify(allWords));
            currentWordIdx = 0;
            showWord();
            alert(`✨ All words: ${filteredWords.length} words.`);
        } else {
            let day = Number(dayNum.value);
            if(isNaN(day) || day < 1) { alert("Enter valid day number (≥1)"); return; }
            filteredWords = allWords.filter(item => item.day === day);
            if(filteredWords.length === 0) alert(`No words for Day ${day}.`);
            currentWordIdx = 0;
            showWord();
        }
        updateInfoTip();
    }

    function updateSentenceUI() {
        if (!allSentences.length) return;
        const sent = allSentences[currentSentenceIdx];
        const meaningDiv = document.querySelector("#sentenceContent .sentence-meaning");
        const enSpan = document.getElementById("sentenceEnHidden");
        if(meaningDiv) meaningDiv.innerHTML = `📖 ${sent.sentence_zh}`;
        if(enSpan) { enSpan.innerText = sent.sentence_en; enSpan.style.display = "none"; }
        const tipSpan = document.getElementById("sentenceTip");
        if(tipSpan) tipSpan.innerText = `📌 ${currentSentenceIdx+1} / ${allSentences.length} sentences`;
        updateSentenceStats();
        const prevBtn = document.getElementById("prevSentenceBtn");
        if (prevBtn) prevBtn.disabled = currentSentenceIdx === 0;
        attachSentenceEvents();
    }
    
    function updateSentenceStats() { 
        const statsSpan = document.getElementById("sentenceStats"); 
        if(statsSpan) statsSpan.innerText = `${allSentences.length} sentences`; 
    }
    
    function showCurrentSentence() { 
        const hiddenSpan = document.getElementById("sentenceEnHidden"); 
        if(hiddenSpan) hiddenSpan.style.display = "block"; 
    }
    
    function prevSentence() { 
        if(allSentences.length && currentSentenceIdx > 0) { 
            currentSentenceIdx--; 
            updateSentenceUI(); 
            stopAllReading(); 
        } 
    }
    
    function nextSentence() { 
        if(allSentences.length && currentSentenceIdx < allSentences.length - 1) { 
            currentSentenceIdx++; 
            updateSentenceUI(); 
            stopAllReading(); 
        } else if(allSentences.length) { 
            alert("🎉 You've completed all sentences!"); 
        } 
    }

    function attachSentenceEvents() {
        const showBtn = document.getElementById("showSentenceBtn");
        const readBtn = document.getElementById("readSentenceBtn");
        const prevBtn = document.getElementById("prevSentenceBtn");
        const nextBtn = document.getElementById("nextSentenceBtn");
        const allBtn = document.getElementById("showAllSentencesBtn");
        
        if(showBtn) showBtn.onclick = () => showCurrentSentence();
        if(readBtn) readBtn.onclick = () => { 
            const currentSent = allSentences[currentSentenceIdx]; 
            if(currentSent) readSentence3Times(currentSent.sentence_en, readBtn); 
        };
        if(prevBtn) prevBtn.onclick = () => prevSentence();
        if(nextBtn) nextBtn.onclick = () => nextSentence();
        if(allBtn) allBtn.onclick = () => showAllSentencesPopup();
    }
    
    function initDaySelectToggle() {
        const daySelect = document.getElementById('daySelect');
        const dayNum = document.getElementById('dayNum');
        function update() { 
            if (daySelect.value === 'all') { 
                dayNum.type = 'text'; 
                dayNum.value = '--'; 
                dayNum.readOnly = true; 
            } else { 
                dayNum.type = 'number'; 
                dayNum.value = '1'; 
                dayNum.readOnly = false; 
                dayNum.min = '1'; 
            } 
        }
        daySelect.addEventListener('change', update);
        update();
    }
    
    // DOM Event Listeners
    document.addEventListener('DOMContentLoaded', () => {
        initDaySelectToggle();
        if (synth.getVoices().length === 0) synth.onvoiceschanged = () => {};
        const levelConfirm = document.getElementById('levelConfirm');
        const fileConfirm = document.getElementById('fileConfirm');
        const filterBtn = document.getElementById('filterBtn');
        const showAllWordsBtn = document.getElementById('showAllBtn');
        const modeToggle = document.getElementById('modeToggleBtn');
        const externalConfirm = document.getElementById('externalUrlConfirmBtn');
        
        modeToggle.addEventListener('click', () => {
            if (currentMode === "local") toggleMode("external");
            else toggleMode("local");
        });
        
        levelConfirm.addEventListener('click', () => {
            if (currentMode !== "local") return;
            stopAllReading();
            const level = document.getElementById('levelSelect').value;
            if(!level) { alert("Please select P1 or P2"); return; }
            currentLevel = level;
            loadFileListByLevel(level);
            document.getElementById("sentenceArea").style.display = 'none';
            document.getElementById("wordContent").innerHTML = '<p>✅ Level selected, choose a file.</p>';
            document.getElementById("showAllBtn").style.display = 'none';
            document.getElementById("infoTipContainer").innerHTML = '';
            allWords = []; filteredWords = []; allSentences = [];
        });
        
        fileConfirm.addEventListener('click', async () => {
            if (currentMode !== "local") return;
            const fileSelect = document.getElementById('fileSelect');
            const selected = fileSelect.value;
            if(!selected || selected === "Loading..." || selected.includes("fail")) { 
                alert("Please select a valid file"); 
                return; 
            }
            await loadSelectedFile(selected);
        });
        
        externalConfirm.addEventListener('click', async () => {
            if (currentMode !== "external") return;
            let url = document.getElementById('externalUrlInput').value.trim();
            if (!url) { 
                alert("Please enter a valid Excel direct link (.xlsx)"); 
                return; 
            }
            if (url.includes("github.com") && url.includes("/blob/")) {
                url = url.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
                document.getElementById('externalUrlInput').value = url;
            }
            await loadFromExternalUrl(url);
        });
        
        filterBtn.addEventListener('click', () => filterByDay());
        showAllWordsBtn.addEventListener('click', () => showAllWordsPopup());
        toggleMode("local");
    });
