<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kids Word & Sentence Practice</title>
    <!-- Excel 解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* ====================== 全局基础样式 ====================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f4f8;
            padding: 15px;
            line-height: 1.5;
        }

        /* 主容器 */
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        /* 标题 */
        .header {
            background: linear-gradient(135deg, #ff9a56, #ff6b35);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 26px;
            letter-spacing: 1px;
        }

        /* 选择区 */
        .select-section {
            padding: 16px 18px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .select-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }
        .select-row label {
            font-weight: 600;
            color: #1e293b;
            min-width: 60px;
        }
        .select-row select, .select-row input {
            flex: 1;
            padding: 8px 10px;
            font-size: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            background: white;
            height: 42px;
        }
        .select-row button {
            padding: 8px 18px;
            font-size: 15px;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            background: #3b82f6;
        }
        .btn-level { background: #ff4500; }
        .btn-file { background: #0f67b3; }
        .btn-filter { background: #2b7e3a; }
        .select-row button:hover { opacity: 0.85; transform: scale(0.97); }

        /* Day行：All Words和Filter在同一行 */
        #dayRow {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 8px;
        }
        #dayRow label {
            flex-shrink: 0;
            min-width: 50px;
        }
        #daySelect {
            flex: 2;
            min-width: 0;
        }
        #dayNum {
            flex: 1;
            min-width: 60px;
        }
        #filterBtn {
            flex-shrink: 0;
            min-width: 70px;
        }
        
        @media (max-width: 550px) {
            #dayRow {
                gap: 6px;
            }
            #dayRow label {
                min-width: 45px;
                font-size: 14px;
            }
            #daySelect {
                flex: 2;
            }
            #dayNum {
                flex: 1;
                min-width: 55px;
                font-size: 14px;
            }
            #filterBtn {
                min-width: 65px;
                padding: 8px 12px;
                font-size: 14px;
            }
        }

        /* 单词练习区 */
        .practice-section {
            padding: 20px 18px;
            border-bottom: 1px dashed #e2e8f0;
        }
        
        .meaning {
            font-size: 26px;
            color: #0f172a;
            margin-bottom: 15px;
            font-weight: 500;
        }
        .word {
            font-size: clamp(28px, 8vw, 52px);
            font-weight: bold;
            color: #dc2626;
            margin-bottom: 20px;
            word-break: break-word;
        }
        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0;
        }
        .btn-group button {
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            background: #22c55e;
            transition: transform 0.1s;
        }
        .btn-group button:active {
            transform: scale(0.96);
        }
        .btn-prev:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .show-all-btn {
            background: #3b82f6;
            border: none;
            border-radius: 40px;
            padding: 12px;
            color: white;
            font-weight: bold;
            margin: 8px 0 0;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: transform 0.1s;
        }
        .show-all-btn:active {
            transform: scale(0.97);
        }
        .info-tip {
            font-size: 13px;
            color: #64748b;
            text-align: center;
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid #e2e8f0;
        }
        .external-link-badge {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            color: #1890ff;
            display: inline-block;
            margin-bottom: 10px;
        }
        .success-message {
            margin-top: 10px;
            padding: 8px;
            background: #e8f5e9;
            border-radius: 12px;
            color: #2e7d32;
            text-align: center;
            font-size: 14px;
        }

        /* ========= 句子专区 ========= */
        .sentence-section {
            background: #fef9e8;
            border-top: 3px solid #ffb347;
            padding: 20px 18px;
            border-radius: 0 0 20px 20px;
        }
        .sentence-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 15px;
            border-bottom: 2px solid #ffd966;
            padding-bottom: 8px;
        }
        .sentence-header h3 {
            font-size: 1.5rem;
            color: #c2410c;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sentence-stats {
            font-size: 14px;
            background: #fff1d6;
            padding: 4px 12px;
            border-radius: 40px;
        }
        .sentence-meaning {
            font-size: 22px;
            color: #2c3e2f;
            background: #fff6e5;
            padding: 12px;
            border-radius: 20px;
            margin: 10px 0;
            font-weight: 500;
        }
        .sentence-en {
            font-size: clamp(20px, 6vw, 32px);
            font-weight: bold;
            color: #b45309;
            margin: 12px 0;
            line-height: 1.4;
            word-break: break-word;
        }
        /* 句子按钮组 - 与单词按钮组样式完全一致 */
        .sentence-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0;
        }
        .sentence-buttons button {
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            background: #22c55e;
            transition: transform 0.1s;
        }
        .sentence-buttons button:active {
            transform: scale(0.96);
        }
        .sentence-prev:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            opacity: 0.6;
        }
        /* 大按钮样式与Show All Words一致，颜色为蓝底白字 */
        .btn-sentence-all {
            background: #3b82f6;
            border: none;
            border-radius: 40px;
            padding: 12px;
            color: white;
            font-weight: bold;
            margin-top: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: transform 0.1s;
        }
        .btn-sentence-all:active {
            transform: scale(0.97);
        }
        .sentence-tip {
            font-size: 12px;
            text-align: center;
            color: #a16207;
            margin-top: 12px;
        }
        
        /* 朗读中仅禁用朗读按钮本身，不禁用其他按钮 */
        button.reading-disabled {
            opacity: 0.6;
            cursor: wait;
            pointer-events: none;
        }
        
        .footer {
            max-width: 700px;
            margin: 20px auto 20px;
            text-align: center;
            font-size: 13px;
            color: #5b6e8c;
        }
        .footer a {
            color: #ff6b35;
            text-decoration: none;
            margin: 0 6px;
        }
        
        @media (max-width: 550px) {
            .meaning { font-size: 22px; }
            .sentence-meaning { font-size: 18px; }
            .btn-group button, .sentence-buttons button, .show-all-btn, .btn-sentence-all {
                font-size: 14px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌟 Kids Word & Sentence Practice 🌟</h1>
    </div>

    <div class="select-section">
        <div class="select-row">
            <label>Level:</label>
            <select id="levelSelect">
                <option value="">Select P1/P2</option>
                <option value="P1">P1</option>
                <option value="P2">P2</option>
            </select>
            <button class="btn-level" id="levelConfirm">Confirm</button>
        </div>
        <div class="select-row" id="fileRow" style="display:none;">
            <label>File:</label>
            <select id="fileSelect"><option>Loading...</option></select>
            <button class="btn-file" id="fileConfirm">Confirm</button>
        </div>
        <div class="select-row" id="dayRow" style="display:none;">
            <label>Day:</label>
            <select id="daySelect">
                <option value="all" selected>All Words</option>
                <option value="custom">Custom Day</option>
            </select>
            <input type="text" id="dayNum" value="--" readonly>
            <button class="btn-filter" id="filterBtn">Filter</button>
        </div>
    </div>

    <!-- 单词卡片区 -->
    <div class="practice-section" id="wordPracticeArea">
        <div id="wordContent"><p style="color:#64748b;">✨ Select Level & File to start ✨</p></div>
        <button class="show-all-btn" id="showAllBtn" style="display:none;">📋 Show All Words</button>
        <div id="infoTipContainer" class="info-tip"></div>
    </div>

    <!-- 句子专区 (独立于筛选, 仅与当前File绑定) -->
    <div class="sentence-section" id="sentenceArea" style="display:none;">
        <div class="sentence-header">
            <h3>✏️ Sentence Practice</h3>
            <span class="sentence-stats" id="sentenceStats">0 sentences</span>
        </div>
        <div id="sentenceContent">
            <div class="sentence-meaning">💡 Chinese meaning will appear</div>
            <div class="sentence-en" id="sentenceEnHidden" style="display:none;"></div>
            <div class="sentence-buttons">
                <button id="showSentenceBtn">📖 Show Sentence</button>
                <button id="readSentenceBtn">🔊 Read 3x</button>
                <button id="prevSentenceBtn" class="sentence-prev">⬅️ Previous</button>
                <button id="nextSentenceBtn">➡️ Next</button>
            </div>
            <button id="showAllSentencesBtn" class="btn-sentence-all">📜 Show All Sentences</button>
            <div class="sentence-tip" id="sentenceTip">⭐ Practice everyday sentences!</div>
        </div>
    </div>
</div>
<div class="footer">
    <a href="about.html">About</a> | <a href="privacy.html">Privacy Policy</a> | <a href="disclaimer.html">Disclaimer</a>
</div>

<script>
    // ---------- 全局变量 ----------
    let allWords = [];
    let filteredWords = [];
    let currentWordIdx = 0;

    let allSentences = [];
    let currentSentenceIdx = 0;
    let currentFileNameForSentences = "";
    
    let currentLevel = "";
    let currentFileName = "";
    let currentFileExtension = "";
    let isExternalFile = false;
    let externalFileUrl = "";
    
    const synth = window.speechSynthesis;

    let wordReadTimer = null;
    let sentenceReadTimer = null;
    let isSentenceReading = false;
    let currentReadButton = null;

    // ---------- 动态仓库分支 ----------
    function getRawBaseUrl() {
        if (window.location.protocol === 'file:') return 'https://raw.githubusercontent.com/vizaiweb/word-review/main';
        const host = window.location.hostname;
        const path = window.location.pathname;
        if (host.includes('dev') || path.includes('dev')) return 'https://raw.githubusercontent.com/vizaiweb/word-review/dev';
        return 'https://raw.githubusercontent.com/vizaiweb/word-review/main';
    }

    function getFileListUrl(level) { return `${getRawBaseUrl()}/data/${level}/fileList.json`; }
    function getDataFileUrl(level, filename) { return `${getRawBaseUrl()}/data/${level}/${filename}`; }

    function removeExtension(fname) { return fname.replace(/\.(xlsx|json)$/i, ''); }

    function initDaySelectToggle() {
        const daySelect = document.getElementById('daySelect');
        const dayNum = document.getElementById('dayNum');
        function update() {
            if (daySelect.value === 'all') {
                dayNum.type = 'text';
                dayNum.value = '--';
                dayNum.readOnly = true;
            } else {
                dayNum.type = 'number';
                dayNum.value = '1';
                dayNum.readOnly = false;
                dayNum.min = '1';
            }
        }
        daySelect.addEventListener('change', update);
        update();
    }

    async function loadFileListByLevel(level) {
        const fileSelect = document.getElementById('fileSelect');
        const fileRow = document.getElementById('fileRow');
        fileSelect.innerHTML = '<option>Loading...</option>';
        fileRow.style.display = 'flex';
        try {
            const res = await fetch(getFileListUrl(level));
            if (!res.ok) throw new Error();
            const config = await res.json();
            const files = config.files || [];
            fileSelect.innerHTML = '';
            if (files.length === 0) { fileSelect.innerHTML = '<option>No files</option>'; return; }
            files.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f;
                opt.textContent = removeExtension(f);
                fileSelect.appendChild(opt);
            });
        } catch(e) {
            fileSelect.innerHTML = '<option>Load failed</option>';
            console.error(e);
        }
    }

    // 解析 JSON 檔案 (支援兩種格式)
    function parseJsonData(jsonData) {
        let words = [];
        let sentences = [];
        
        // 格式1: 直接是 { vocabulary: [...], sentences: [...] }
        if (jsonData.vocabulary && Array.isArray(jsonData.vocabulary)) {
            if (jsonData.vocabulary.length > 0) {
                const firstItem = jsonData.vocabulary[0];
                if (Array.isArray(firstItem)) {
                    words = jsonData.vocabulary.map(item => ({
                        word: String(item[0]).trim(),
                        meaning: String(item[1]).trim(),
                        day: Number(item[2])
                    }));
                } else if (firstItem.word && firstItem.meaning) {
                    words = jsonData.vocabulary.map(item => ({
                        word: String(item.word).trim(),
                        meaning: String(item.meaning).trim(),
                        day: Number(item.day)
                    }));
                }
            }
            
            if (jsonData.sentences && Array.isArray(jsonData.sentences)) {
                const firstSentence = jsonData.sentences[0];
                if (Array.isArray(firstSentence)) {
                    sentences = jsonData.sentences.map(item => ({
                        sentence_en: String(item[0]).trim(),
                        sentence_zh: item[1] ? String(item[1]).trim() : "✨ Practice sentence"
                    }));
                } else if (firstSentence.sentence && firstSentence.chinese) {
                    sentences = jsonData.sentences.map(item => ({
                        sentence_en: String(item.sentence).trim(),
                        sentence_zh: String(item.chinese).trim()
                    }));
                }
            }
        }
        // 格式2: Excel 風格的工作表結構
        else if (jsonData["工作表1"] && Array.isArray(jsonData["工作表1"])) {
            const sheet1 = jsonData["工作表1"];
            for (let i = 1; i < sheet1.length; i++) {
                const row = sheet1[i];
                if (row && row.length >= 3) {
                    words.push({
                        word: String(row[0]).trim(),
                        meaning: String(row[1]).trim(),
                        day: Number(row[2])
                    });
                }
            }
            
            if (jsonData["工作表2"] && Array.isArray(jsonData["工作表2"])) {
                const sheet2 = jsonData["工作表2"];
                for (let i = 1; i < sheet2.length; i++) {
                    const row = sheet2[i];
                    if (row && row.length >= 2) {
                        sentences.push({
                            sentence_en: String(row[0]).trim(),
                            sentence_zh: String(row[1]).trim()
                        });
                    }
                }
            }
        }
        
        return { words, sentences };
    }

    // 讀取 Excel 資料
    async function loadExcelData(wb) {
        const sheetName0 = wb.SheetNames[0];
        const wordData = XLSX.utils.sheet_to_json(wb.Sheets[sheetName0]);
        const words = wordData.filter(item => item.word && item.meaning && item.day).map(item => ({
            word: String(item.word).trim(),
            meaning: String(item.meaning).trim(),
            day: Number(item.day)
        }));
        
        let sentences = [];
        if (wb.SheetNames.length >= 2) {
            const sheetName1 = wb.SheetNames[1];
            const rawSentences = XLSX.utils.sheet_to_json(wb.Sheets[sheetName1]);
            if (rawSentences && rawSentences.length) {
                sentences = rawSentences.map(row => {
                    let en = row.sentence || row.sentence_en || row.english || row.en || row.Sentence || row.English;
                    let zh = row.chinese || row.meaning || row.zh || row.sentence_zh || row.Chinese || row.Meaning;
                    if (!en) return null;
                    return { 
                        sentence_en: String(en).trim(), 
                        sentence_zh: zh ? String(zh).trim() : "✨ Practice sentence" 
                    };
                }).filter(s => s && s.sentence_en);
            }
        }
        
        return { words, sentences };
    }

    // 通用載入資料函數
    async function loadDataFromUrl(url, isExternal = false) {
        stopAllReading();
        
        const wordDiv = document.getElementById("wordContent");
        wordDiv.innerHTML = '<p>📖 載入資料中...</p>';
        document.getElementById("dayRow").style.display = 'flex';
        document.getElementById("sentenceArea").style.display = 'none';
        document.getElementById("showAllBtn").style.display = 'none';
        document.getElementById("infoTipContainer").innerHTML = '';
        
        try {
            console.log("開始載入:", url);
            const response = await fetch(url);
            console.log("回應狀態:", response.status);
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            let words = [];
            let sentences = [];
            
            // 根據副檔名判斷格式
            if (url.toLowerCase().endsWith('.json')) {
                const jsonData = await response.json();
                console.log("JSON 資料接收完成");
                const result = parseJsonData(jsonData);
                words = result.words;
                sentences = result.sentences;
            } else if (url.toLowerCase().endsWith('.xlsx')) {
                const buf = await response.arrayBuffer();
                const wb = XLSX.read(buf, { type: "array" });
                const result = await loadExcelData(wb);
                words = result.words;
                sentences = result.sentences;
            } else {
                // 嘗試當作 JSON 處理
                const jsonData = await response.json();
                const result = parseJsonData(jsonData);
                words = result.words;
                sentences = result.sentences;
            }
            
            console.log(`解析完成: ${words.length} 個單字, ${sentences.length} 個句子`);
            
            allWords = words;
            filteredWords = [...allWords];
            currentWordIdx = 0;
            
            if (filteredWords.length) {
                showWord();
                updateInfoTip();
            } else {
                wordDiv.innerHTML = '<p>⚠️ 此檔案沒有單字資料。</p>';
            }
            document.getElementById("showAllBtn").style.display = allWords.length ? 'inline-block' : 'none';
            
            // 句子處理
            allSentences = sentences;
            
            if (allSentences.length === 0) {
                document.getElementById("sentenceArea").style.display = 'none';
            } else {
                document.getElementById("sentenceArea").style.display = 'block';
                currentSentenceIdx = 0;
                updateSentenceUI();
                updateSentenceStats();
            }
            
            // 顯示外部連結提示
            if (isExternal) {
                const tipContainer = document.getElementById("infoTipContainer");
                if (tipContainer) {
                    tipContainer.innerHTML = `<div class="external-link-badge">🔗 外部連結：<a href="${url}" target="_blank" style="color:#1890ff;">${url.length > 60 ? url.substring(0, 60) + '...' : url}</a></div>`;
                }
            }
            
            // 顯示成功訊息
            const successMsg = document.createElement('div');
            successMsg.className = 'success-message';
            successMsg.innerHTML = `✅ 成功載入 ${allWords.length} 個單字，${allSentences.length} 個句子`;
            wordDiv.appendChild(successMsg);
            
        } catch(err) {
            console.error("載入錯誤:", err);
            wordDiv.innerHTML = `<p style="color:#ef4444;">❌ 無法載入檔案，請檢查網址是否正確。<br>
            網址: ${url}<br>
            錯誤: ${err.message}</p>`;
            document.getElementById("sentenceArea").style.display = 'none';
        }
    }

    // 從 URL 參數載入外部檔案
    async function loadFromUrlParameter(fileUrl) {
        console.log("載入外部檔案:", fileUrl);
        
        // 隱藏選擇區域，顯示外部載入模式
        const fileRow = document.getElementById('fileRow');
        const levelSelect = document.getElementById('levelSelect');
        const levelConfirm = document.getElementById('levelConfirm');
        
        fileRow.style.display = 'none';
        levelSelect.disabled = true;
        levelConfirm.disabled = true;
        
        // 處理 GitHub blob 連結轉換為 raw 連結
        let actualUrl = fileUrl;
        if (fileUrl.includes('github.com') && fileUrl.includes('/blob/')) {
            actualUrl = fileUrl
                .replace('github.com', 'raw.githubusercontent.com')
                .replace('/blob/', '/');
            console.log("轉換為 Raw 連結:", actualUrl);
        }
        
        isExternalFile = true;
        externalFileUrl = actualUrl;
        currentFileName = actualUrl.split('/').pop();
        currentFileNameForSentences = currentFileName;
        
        // 顯示載入狀態
        const wordDiv = document.getElementById("wordContent");
        wordDiv.innerHTML = '<p>📖 正在從外部連結載入資料...</p>';
        document.getElementById("sentenceArea").style.display = 'none';
        document.getElementById("showAllBtn").style.display = 'none';
        
        await loadDataFromUrl(actualUrl, true);
    }

    // 加載檔案 (自動判斷格式) - 保留原有功能
    async function loadSelectedFile(filename) {
        if (!filename || !currentLevel) return;
        isExternalFile = false;
        currentFileName = filename;
        currentFileNameForSentences = filename;
        
        const isJson = filename.toLowerCase().endsWith('.json');
        currentFileExtension = isJson ? 'json' : 'xlsx';
        
        const url = getDataFileUrl(currentLevel, filename);
        await loadDataFromUrl(url, false);
    }

    function showWord() {
        stopAllReading();
        const container = document.getElementById("wordContent");
        if (!filteredWords.length) {
            container.innerHTML = '<p>📭 No words match this day.</p>';
            updateInfoTip();
            return;
        }
        if (currentWordIdx >= filteredWords.length) {
            container.innerHTML = '<p style="color:#22c55e;">🎉 Great! All words practiced!</p>';
            updateInfoTip();
            return;
        }
        const w = filteredWords[currentWordIdx];
        const isFirst = currentWordIdx === 0;
        container.innerHTML = `
            <div class="meaning">💡 ${w.meaning}</div>
            <div class="word" id="currentWordSpan" style="display:none;">${w.word.toUpperCase()}</div>
            <div class="btn-group">
                <button class="btn-show" id="btnShowWord">👀 Show Word</button>
                <button class="btn-read" id="btnReadWord">🔊 Read 3x</button>
                <button class="btn-prev" id="btnPrevWord" ${isFirst ? "disabled" : ""}>⬅️ Previous</button>
                <button class="btn-next" id="btnNextWord">➡️ Next</button>
            </div>
        `;
        updateInfoTip();
        
        document.getElementById("btnShowWord")?.addEventListener("click", () => {
            const wordSpan = document.getElementById("currentWordSpan");
            if(wordSpan) wordSpan.style.display = "block";
        });
        document.getElementById("btnReadWord")?.addEventListener("click", () => read3Times(w.word));
        document.getElementById("btnPrevWord")?.addEventListener("click", () => { 
            if(currentWordIdx > 0) { currentWordIdx--; showWord(); } 
        });
        document.getElementById("btnNextWord")?.addEventListener("click", () => { 
            if(currentWordIdx + 1 <= filteredWords.length) { currentWordIdx++; showWord(); } 
        });
    }

    function updateInfoTip() {
        const container = document.getElementById('infoTipContainer');
        if (!container) return;
        
        if (isExternalFile && container.innerHTML.includes('external-link-badge')) {
            return;
        }
        
        if (!currentFileName || filteredWords.length === 0 || !filteredWords[currentWordIdx]) {
            return;
        }
        const displayFile = removeExtension(currentFileName);
        const currentWord = filteredWords[currentWordIdx];
        if (currentWord) {
            container.innerHTML = `${displayFile} | Day ${currentWord.day} | ${currentWordIdx + 1}/${filteredWords.length} vocabs`;
        } else {
            container.innerHTML = `${displayFile} | 0/0 vocabs`;
        }
    }

    function filterByDay() {
        stopAllReading();
        const daySelect = document.getElementById('daySelect');
        const dayNum = document.getElementById('dayNum');
        if(daySelect.value === 'all') {
            filteredWords = JSON.parse(JSON.stringify(allWords));
            currentWordIdx = 0;
            showWord();
            alert(`✨ All words: ${filteredWords.length} words.`);
        } else {
            let day = Number(dayNum.value);
            if(isNaN(day) || day < 1) { alert("Enter valid day number ≥1"); return; }
            filteredWords = allWords.filter(item => item.day === day);
            if(filteredWords.length === 0) alert(`No words for Day ${day}.`);
            currentWordIdx = 0;
            showWord();
        }
        updateInfoTip();
    }

    // 朗读核心：带回调，确保完整读完
    function speakTextWithCallback(text, onEnd, rate = 0.8) {
        if (!text) { if (onEnd) onEnd(); return; }
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "en-US";
        utterance.rate = rate;
        utterance.volume = 1;
        const voices = synth.getVoices();
        const femaleVoice = voices.find(v => v.lang.includes("en") && (v.name.includes("Google") || v.name.includes("Samantha") || v.name.includes("Female")));
        if (femaleVoice) utterance.voice = femaleVoice;
        utterance.onend = () => { if (onEnd) onEnd(); };
        utterance.onerror = () => { if (onEnd) onEnd(); };
        synth.speak(utterance);
    }

    // 单词朗读3次
    function read3Times(word) {
        if (wordReadTimer) {
            clearInterval(wordReadTimer);
            wordReadTimer = null;
        }
        synth.cancel();
        
        let count = 0;
        function speakNext() {
            if (count >= 3) return;
            speakTextWithCallback(word, () => {
                count++;
                if (count < 3) speakNext();
            }, 0.8);
        }
        speakNext();
    }
    
    // 句子朗读3次
    function readSentence3Times(sentenceText, buttonElement) {
        if (!sentenceText) return;
        
        if (sentenceReadTimer) {
            clearInterval(sentenceReadTimer);
            sentenceReadTimer = null;
        }
        
        if (isSentenceReading) {
            synth.cancel();
            isSentenceReading = false;
            if (currentReadButton) {
                currentReadButton.classList.remove('reading-disabled');
                currentReadButton.disabled = false;
            }
        }
        
        currentReadButton = buttonElement;
        
        if (currentReadButton) {
            currentReadButton.classList.add('reading-disabled');
            currentReadButton.disabled = true;
        }
        
        let readCount = 0;
        isSentenceReading = true;
        
        function speakNext() {
            if (readCount >= 3) {
                if (currentReadButton) {
                    currentReadButton.classList.remove('reading-disabled');
                    currentReadButton.disabled = false;
                }
                isSentenceReading = false;
                currentReadButton = null;
                return;
            }
            speakTextWithCallback(sentenceText, () => {
                readCount++;
                speakNext();
            }, 0.8);
        }
        
        synth.cancel();
        speakNext();
    }
    
    function stopAllReading() {
        synth.cancel();
        
        if (wordReadTimer) {
            clearInterval(wordReadTimer);
            wordReadTimer = null;
        }
        
        if (sentenceReadTimer) {
            clearInterval(sentenceReadTimer);
            sentenceReadTimer = null;
        }
        
        if (isSentenceReading) {
            isSentenceReading = false;
            if (currentReadButton) {
                currentReadButton.classList.remove('reading-disabled');
                currentReadButton.disabled = false;
                currentReadButton = null;
            }
        }
    }

    function updateSentenceUI() {
        if (!allSentences.length) return;
        const sent = allSentences[currentSentenceIdx];
        const meaningDiv = document.querySelector("#sentenceContent .sentence-meaning");
        const enSpan = document.getElementById("sentenceEnHidden");
        if(meaningDiv) meaningDiv.innerHTML = `📖 ${sent.sentence_zh}`;
        if(enSpan) {
            enSpan.innerText = sent.sentence_en;
            enSpan.style.display = "none";
        }
        const tipSpan = document.getElementById("sentenceTip");
        if(tipSpan) tipSpan.innerText = `📌 ${currentSentenceIdx+1} / ${allSentences.length} sentences`;
        updateSentenceStats();
        
        const prevBtn = document.getElementById("prevSentenceBtn");
        if (prevBtn) {
            if (currentSentenceIdx === 0) {
                prevBtn.disabled = true;
            } else {
                prevBtn.disabled = false;
            }
        }
        
        attachSentenceEvents();
    }

    function updateSentenceStats() {
        const statsSpan = document.getElementById("sentenceStats");
        if(statsSpan) statsSpan.innerText = `${allSentences.length} sentences`;
    }

    function showCurrentSentence() {
        const hiddenSpan = document.getElementById("sentenceEnHidden");
        if(hiddenSpan) hiddenSpan.style.display = "block";
    }

    function prevSentence() {
        if(allSentences.length === 0) return;
        stopAllReading();
        if(currentSentenceIdx > 0) {
            currentSentenceIdx--;
            updateSentenceUI();
        }
    }

    function nextSentence() {
        if(allSentences.length === 0) return;
        stopAllReading();
        if(currentSentenceIdx < allSentences.length - 1) {
            currentSentenceIdx++;
            updateSentenceUI();
        } else { 
            alert("🎉 You've completed all sentences!"); 
        }
    }

    function attachSentenceEvents() {
        const showBtn = document.getElementById("showSentenceBtn");
        const readBtn = document.getElementById("readSentenceBtn");
        const prevBtn = document.getElementById("prevSentenceBtn");
        const nextBtn = document.getElementById("nextSentenceBtn");
        const allBtn = document.getElementById("showAllSentencesBtn");
        
        if(showBtn) showBtn.onclick = () => showCurrentSentence();
        if(readBtn) readBtn.onclick = () => {
            const currentSent = allSentences[currentSentenceIdx];
            if(currentSent && currentSent.sentence_en) {
                readSentence3Times(currentSent.sentence_en, readBtn);
            }
        };
        if(prevBtn) prevBtn.onclick = () => prevSentence();
        if(nextBtn) nextBtn.onclick = () => nextSentence();
        if(allBtn) allBtn.onclick = () => showAllSentencesPopup();
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
        initDaySelectToggle();
        if (synth.getVoices().length === 0) {
            synth.onvoiceschanged = () => {};
        }
        
        // 檢查 URL 參數
        const urlParams = new URLSearchParams(window.location.search);
        const fileParam = urlParams.get('file');
        
        console.log("URL 參數 file:", fileParam);
        
        if (fileParam && fileParam.trim() !== '') {
            // 有 file 參數，直接載入外部檔案
            console.log("偵測到 file 參數，開始載入外部檔案:", fileParam);
            loadFromUrlParameter(fileParam.trim());
        } else {
            console.log("無 file 參數，使用正常模式");
            // 無參數，正常初始化選擇介面
            const levelConfirm = document.getElementById('levelConfirm');
            const fileConfirm = document.getElementById('fileConfirm');
            const filterBtn = document.getElementById('filterBtn');
            const showAllWordsBtn = document.getElementById('showAllBtn');

            levelConfirm.addEventListener('click', () => {
                stopAllReading();
                const level = document.getElementById('levelSelect').value;
                if(!level) { alert("Please select P1 or P2"); return; }
                currentLevel = level;
                loadFileListByLevel(level);
                document.getElementById("sentenceArea").style.display = 'none';
                document.getElementById("wordContent").innerHTML = '<p>✅ Level selected, choose a file.</p>';
                document.getElementById("showAllBtn").style.display = 'none';
                document.getElementById("infoTipContainer").innerHTML = '';
                allWords = []; filteredWords = []; allSentences = [];
                isExternalFile = false;
            });

            fileConfirm.addEventListener('click', async () => {
                stopAllReading();
                const fileSelect = document.getElementById('fileSelect');
                const selected = fileSelect.value;
                if(!selected || selected === "Loading..." || selected.includes("fail")) { alert("Please select a valid file"); return; }
                await loadSelectedFile(selected);
            });

            filterBtn.addEventListener('click', () => filterByDay());
            showAllWordsBtn.addEventListener('click', () => showAllWordsPopup());
        }
    });
