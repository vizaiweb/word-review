<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝贝的英文单词复习</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: Arial, 微软雅黑;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f9f9f9;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #e67e22;
            font-size: 36px;
            margin-bottom: 30px;
        }
        .meaning {
            font-size: 28px;
            color: #2c3e50;
            margin: 20px 0;
        }
        .word {
            font-size: 48px;
            font-weight: bold;
            color: #e74c3c;
            margin: 30px 0;
            display: none;
        }
        button {
            font-size: 24px;
            padding: 15px 40px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }
        .show-btn { background: #9b59b6; }
        .next-btn { background: #27ae60; }
        .tip {
            font-size: 16px;
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌟 宝贝的英文单词复习 🌟</h1>
        <div id="content">加载中...</div>
        <div class="tip">已跳过日期筛选，显示所有单词</div>
    </div>

    <script>
        let allWords = [];
        let current = 0;

        // 直接读取Excel并显示所有单词
        async function loadAllWords() {
            try {
                // 读取GitHub上的words.xlsx
                const res = await fetch('words.xlsx');
                const buf = await res.arrayBuffer();
                const wb = XLSX.read(buf, { type: 'array' });
                // 取第一个工作表的数据
                const sheet = wb.Sheets[wb.SheetNames[0]];
                allWords = XLSX.utils.sheet_to_json(sheet);
                
                if (allWords.length === 0) {
                    document.getElementById('content').innerHTML = '<div>❌ 没有读取到单词</div>';
                    return;
                }
                // 显示第一个单词
                showWord();
            } catch (err) {
                document.getElementById('content').innerHTML = `<div>❌ 加载失败：${err.message}</div>`;
            }
        }

        // 显示当前单词
        function showWord() {
            if (current >= allWords.length) {
                document.getElementById('content').innerHTML = '<div>🎉 所有单词复习完成！</div>';
                return;
            }
            const word = allWords[current];
            document.getElementById('content').innerHTML = `
                <div class="meaning">💡 中文：${word.meaning || '无释义'}</div>
                <div class="word" id="wordText">${word.word || '无单词'}</div>
                <button class="show-btn" onclick="document.getElementById('wordText').style.display='block'">👀 显示单词</button>
                <button class="next-btn" onclick="nextWord()">➡️ 下一个</button>
            `;
        }

        // 下一个单词
        function nextWord() {
            current++;
            showWord();
        }

        // 页面加载时执行
        window.onload = loadAllWords;
    </script>
</body>
</html>
